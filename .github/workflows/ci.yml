name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma validate
      - run: npm run lint
      - run: npm run build
        env:
          DATABASE_URL: postgresql://camille:camille@127.0.0.1:5432/camille
          BETTER_AUTH_SECRET: ci-secret-must-be-at-least-32-chars-long
          BETTER_AUTH_URL: http://localhost:3000
