<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camille — Immersive French Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: '#0B0F1A',
            canvas2: '#141927',
            canvas3: '#1C2333',
            ink: '#F5EFE4',
            ink2: '#C8C2B6',
            mute: '#8A8576',
            mute2: '#5C5849',
            rule: '#252B3B',
            rule2: '#323A4D',
            wine: '#C2410C',
            wine2: '#EA580C',
            wineSoft: '#3A1E12',
          },
          fontFamily: {
            serif: ['Fraunces', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    html, body { background: #0B0F1A; color: #F5EFE4; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; font-variation-settings: "opsz" 96; }
    .font-display-sm { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; font-variation-settings: "opsz" 24; }
    .tabular { font-variant-numeric: tabular-nums; }
    .smallcaps { font-variant: small-caps; letter-spacing: 0.08em; }
    /* Subtle scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #323A4D; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    /* Cross-fade page transitions */
    .page-enter { animation: pageIn 320ms ease-out both; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Subtle pulse for live state */
    @keyframes breath {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    .breath { animation: breath 4.2s ease-in-out infinite; }
    /* Caret blink */
    @keyframes caret { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0; } }
    .caret { animation: caret 1.1s steps(1) infinite; }
    /* Hide focus rings on mouse, keep on keyboard */
    :focus:not(:focus-visible) { outline: none; }
    :focus-visible { outline: 1.5px solid #C2410C; outline-offset: 3px; border-radius: 2px; }
    /* Subtle text underline animation */
    .editorial-link { background-image: linear-gradient(currentColor, currentColor); background-size: 100% 1px; background-position: 0 100%; background-repeat: no-repeat; }
    /* Diagnostic mode body shift */
    .diagnostic-mode { background: #141927; }
    /* Video-call vignette */
    .vc-vignette { background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%); }
    /* Glow for active speaker */
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(194,65,12,0.4), 0 0 40px rgba(194,65,12,0.2); }
      50% { box-shadow: 0 0 0 2px rgba(194,65,12,0.6), 0 0 60px rgba(194,65,12,0.35); }
    }
    .speaker-glow { animation: glow 2.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/atoms.jsx"></script>
  <script type="text/babel" src="src/avatar.jsx"></script>
  <script type="text/babel" src="src/screens-landing.jsx"></script>
  <script type="text/babel" src="src/screens-auth.jsx"></script>
  <script type="text/babel" src="src/screens-home.jsx"></script>
  <script type="text/babel" src="src/screens-scenario.jsx"></script>
  <script type="text/babel" src="src/screens-session.jsx"></script>
  <script type="text/babel" src="src/screens-diagnostic.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
